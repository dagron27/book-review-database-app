<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reviews</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Book Reviews</h1>

    <div class="container">
        <div class="book">
            <!-- Add a div to input book data -->
            <div id="addBook">
                <h2>Add a Book</h2>
                <input type="text" id="bookTitle" placeholder="Book Title">
                <input type="text" id="publicationYear" placeholder="Publication Year">
                <button onclick="addBook()">Add</button>
            </div>

            <!-- Add a div to search books by year -->
            <div id="searchBook">
                <h2>Search Books by Year</h2>
                <input type="text" id="searchYear" placeholder="Search by Year">
                <button onclick="searchBooksByYear()">Search</button>
            </div>

            <!-- Display books in this div -->
            <div id="bookList">
                <!-- Book data will be displayed here dynamically -->
            </div>
            
            <button id="showBooksButton" onclick="showAllBooks()">Show All Books</button>

            <!-- Display books in this div -->
            <div id="allbooks">
                <!-- Book data will be displayed here dynamically -->
            </div>

            <!-- View the current (single, hardcoded demo) user's account -->
            <button id="userAccountButton" onclick="showUserAccountDetails()">View User Account</button>

            <!-- User account details (username, email, reviews) will be displayed here dynamically -->
            <div id="userAccount">
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
